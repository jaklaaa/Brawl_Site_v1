<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drafting — Prodigy</title>

    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/themes.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

    <style>
    /* ══════════════════════════════════════════════════════════
       RESET & BASE
    ══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    .top-bar { display: none; }
    body {
        min-height: 100vh;
        font-family: 'Orbitron', sans-serif;
        background: #0d0d14;
        color: #fff;
        overflow-x: hidden;
    }

    /* ══════════════════════════════════════════════════════════
       GLASS NAV
    ══════════════════════════════════════════════════════════ */
    #glassNav {
        position: sticky; top: 0; z-index: 300;
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 18px; height: 54px;
        background: rgba(8,8,18,0.80);
        backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid rgba(255,255,255,0.07);
        box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    #navBack {
        display: flex; align-items: center; gap: 7px;
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; padding: 6px 14px 6px 10px;
        color: rgba(255,255,255,0.7); font-size: 11px; font-weight: 700;
        letter-spacing: 1px; cursor: pointer;
        transition: background .18s, color .18s;
    }
    #navBack:hover { background: rgba(255,255,255,0.12); color: #fff; }

    #navTitle {
        font-size: 13px; font-weight: 700; letter-spacing: 3px;
        color: rgba(255,255,255,0.82); text-transform: uppercase;
        position: absolute; left: 50%; transform: translateX(-50%);
        pointer-events: none;
    }

    .nav-right { display: flex; align-items: center; gap: 8px; }

    /* Rank badge */
    #navRankBadge {
        display: flex; align-items: center; gap: 7px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 10px; padding: 5px 12px; cursor: pointer;
        font-size: 10px; font-weight: 700; letter-spacing: 1px;
        color: rgba(255,255,255,0.55); transition: background .18s, color .18s;
        white-space: nowrap;
    }
    #navRankBadge:hover { background: rgba(255,255,255,0.1); color: #fff; }
    #navRankImg { width: 22px; height: 22px; object-fit: contain; }

    /* Reset */
    #navReset {
        display: flex; align-items: center; gap: 5px;
        background: rgba(220,50,50,0.08); border: 1px solid rgba(220,50,50,0.18);
        border-radius: 10px; padding: 6px 12px;
        color: rgba(255,110,110,0.8); font-size: 10px; font-weight: 700;
        letter-spacing: 1px; cursor: pointer; transition: background .18s, color .18s;
    }
    #navReset:hover { background: rgba(220,50,50,0.18); color: #ff9090; }

    /* ══════════════════════════════════════════════════════════
       MODALS — shared backdrop
    ══════════════════════════════════════════════════════════ */
    .modal-backdrop {
        display: none; position: fixed; inset: 0; z-index: 500;
        background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
        align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    /* Rank modal */
    #rankModalBox {
        background: rgba(14,14,26,0.97); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px; padding: 22px; width: 340px; max-width: 92vw;
    }
    .modal-heading {
        font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
        color: rgba(255,255,255,0.28); text-transform: uppercase; margin-bottom: 14px;
    }
    .rank-opt {
        display: flex; align-items: center; gap: 12px; padding: 10px 12px;
        border-radius: 10px; cursor: pointer; border: 1px solid transparent;
        transition: background .14s, border-color .14s; margin-bottom: 5px;
    }
    .rank-opt:hover { background: rgba(255,255,255,0.07); }
    .rank-opt.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .rank-opt img { width: 32px; height: 32px; object-fit: contain; }
    .rank-opt-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.75); }
    .rank-opt-range { font-size: 9px; color: rgba(255,255,255,0.25); margin-top: 2px; }

    /* Map image modal */
    #mapImgModalInner {
        background: rgba(12,12,22,0.98); border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px; padding: 20px; max-width: 92vw;
        display: flex; flex-direction: column; gap: 12px; align-items: center;
    }
    #mapImgTitle { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.75); }
    #mapImgEl {
        max-width: 580px; max-height: 60vh; border-radius: 10px;
        object-fit: contain; border: 1px solid rgba(255,255,255,0.08);
    }
    .modal-close-btn {
        padding: 7px 20px; border-radius: 9px; border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.55);
        font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
        letter-spacing: 1px; cursor: pointer; transition: background .15s, color .15s;
    }
    .modal-close-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

    /* ══════════════════════════════════════════════════════════
       MAP PANEL — slides in from right
    ══════════════════════════════════════════════════════════ */
    #mapPanel {
        position: fixed; top: 54px; right: 0;
        width: 310px; max-width: 92vw;
        height: calc(100vh - 54px);
        z-index: 250;
        background: rgba(10,10,20,0.97);
        backdrop-filter: blur(20px);
        border-left: 1px solid rgba(255,255,255,0.08);
        box-shadow: -8px 0 40px rgba(0,0,0,0.55);
        display: flex; flex-direction: column;
        transform: translateX(100%);
        transition: transform 0.32s cubic-bezier(0.22,1,0.36,1);
    }
    #mapPanel.open { transform: translateX(0); }

    .map-panel-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.07); flex-shrink: 0;
    }
    .map-panel-title { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; color: rgba(255,255,255,0.35); text-transform: uppercase; }
    #mapPanelClose {
        background: none; border: none; color: rgba(255,255,255,0.3);
        cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 5px; transition: color .15s;
    }
    #mapPanelClose:hover { color: #fff; }

    #mapModeBar {
        display: flex; gap: 4px; flex-wrap: wrap; padding: 10px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;
    }
    .mode-chip {
        font-size: 8px; font-weight: 700; letter-spacing: 0.5px; padding: 4px 9px;
        border-radius: 6px; border: 1px solid rgba(255,255,255,0.09);
        background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.28);
        cursor: pointer; transition: background .14s, color .14s;
    }
    .mode-chip:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
    .mode-chip.active { background: rgba(255,255,255,0.12); color: #fff; border-color: rgba(255,255,255,0.22); }

    #mapListScroll { flex: 1; overflow-y: auto; padding: 8px 10px 20px; }
    .map-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 10px; border-radius: 8px; cursor: pointer;
        border: 1px solid transparent; margin-bottom: 4px;
        transition: background .13s, border-color .13s;
    }
    .map-row:hover { background: rgba(255,255,255,0.06); }
    .map-row.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.18); }
    .map-row-name { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.72); }
    .map-row-mode { font-size: 8px; color: rgba(255,255,255,0.22); margin-top: 2px; }
    .map-eye {
        background: none; border: none; font-size: 13px; cursor: pointer; padding: 3px 6px;
        border-radius: 5px; color: rgba(255,255,255,0.2); transition: color .14s;
    }
    .map-eye:hover { color: rgba(255,255,255,0.7); }

    /* ══════════════════════════════════════════════════════════
       PAGE — TWO-COLUMN LAYOUT
    ══════════════════════════════════════════════════════════ */
    #draftPage {
        display: grid;
        grid-template-columns: 1fr 316px;
        height: calc(100vh - 54px);
        overflow: hidden;
    }

    /* ── LEFT COLUMN ───────────────────────────────────────── */
    #draftLeft {
        display: flex; flex-direction: column; overflow: hidden;
        min-width: 0;
    }

    /* VS BANNER */
    #vsBanner {
        display: grid;
        grid-template-columns: 1fr 120px 1fr;
        align-items: stretch;
        min-height: 140px; flex-shrink: 0;
        position: relative;
        background: #0d0d14;
        overflow: hidden;
    }
    /* Blue team side */
    #vsBanner::before {
        content: '';
        position: absolute; inset: 0;
        background: linear-gradient(105deg,
            #0a3080 0%, #0e2060 35%,
            transparent 50%,
            #601010 65%, #8b1515 100%);
        pointer-events: none;
    }
    /* Halftone dots texture overlay */
    #vsBanner::after {
        content: '';
        position: absolute; inset: 0;
        background-image:
            radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px);
        background-size: 14px 14px;
        pointer-events: none;
    }

    .team-side {
        display: flex; align-items: center; padding: 14px 14px; gap: 8px;
        flex-wrap: wrap; position: relative; z-index: 1;
    }
    .team-side.enemy-side { justify-content: flex-end; }

    /* Individual team slots */
    .team-slot {
        width: 76px; height: 76px; border-radius: 11px;
        border: 2px dashed rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.05);
        display: flex; align-items: center; justify-content: center;
        position: relative; flex-shrink: 0; overflow: hidden;
        cursor: default; transition: border-color .2s, box-shadow .2s;
    }
    .team-slot.filled {
        border-style: solid; border-color: rgba(120,180,255,0.45);
        box-shadow: 0 0 14px rgba(80,140,255,0.2);
    }
    .team-slot.filled.enemy {
        border-color: rgba(255,100,100,0.45);
        box-shadow: 0 0 14px rgba(255,80,80,0.2);
    }
    .team-slot img.slot-portrait {
        width: 100%; height: 100%; object-fit: cover; border-radius: 9px; display: block;
        pointer-events: none;
    }
    .slot-label {
        position: absolute; bottom: 0; left: 0; right: 0;
        font-size: 6.5px; font-weight: 700; text-align: center;
        color: rgba(255,255,255,0.6); padding: 2px 2px 3px;
        background: linear-gradient(transparent, rgba(0,0,0,0.7));
        border-radius: 0 0 9px 9px; pointer-events: none; letter-spacing: 0.2px;
        text-shadow: 0 1px 3px #000;
    }
    .slot-remove {
        position: absolute; top: -7px; right: -7px;
        width: 19px; height: 19px; border-radius: 50%;
        background: rgba(190,35,35,0.92); border: none; color: #fff;
        font-size: 9px; cursor: pointer; display: none;
        align-items: center; justify-content: center; font-weight: 700; z-index: 10;
    }
    .team-slot.filled:hover .slot-remove { display: flex; }

    /* VS Centre */
    #vsCentre {
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 7px; position: relative; z-index: 1; padding: 6px 0;
    }
    #vsLabel {
        font-size: 38px; font-weight: 700; letter-spacing: 5px; line-height: 1;
        color: #fff;
        text-shadow:
            -2px -2px 0 rgba(0,0,0,0.8),  2px -2px 0 rgba(0,0,0,0.8),
            -2px  2px 0 rgba(0,0,0,0.8),  2px  2px 0 rgba(0,0,0,0.8),
             0    0   16px rgba(255,255,255,0.15);
    }

    /* Map pill under VS */
    #mapPill {
        display: flex; align-items: center; gap: 5px;
        background: rgba(0,0,0,0.45); border: 1px solid rgba(255,255,255,0.15);
        border-radius: 20px; padding: 4px 11px 4px 8px; cursor: pointer;
        transition: background .18s; white-space: nowrap; max-width: 180px;
    }
    #mapPill:hover { background: rgba(0,0,0,0.65); }
    #mapPillText {
        font-size: 9px; font-weight: 700; color: rgba(255,255,255,0.65);
        letter-spacing: 0.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    #viewMapImgBtn {
        font-size: 9px; font-weight: 700; letter-spacing: 0.3px;
        color: rgba(255,255,255,0.3); background: none; border: none;
        cursor: pointer; padding: 1px 4px; border-radius: 4px; transition: color .14s;
        display: none;
    }
    #viewMapImgBtn:hover { color: rgba(255,255,255,0.7); }

    /* Ban strip */
    #banStrip {
        display: flex; align-items: center; gap: 6px;
        padding: 6px 14px; flex-shrink: 0;
        background: rgba(0,0,0,0.3);
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .ban-strip-label {
        font-size: 8px; font-weight: 700; letter-spacing: 1.5px;
        color: rgba(255,90,90,0.5); margin-right: 2px; flex-shrink: 0;
    }
    .ban-slot {
        width: 38px; height: 38px; border-radius: 7px;
        border: 1.5px dashed rgba(255,70,70,0.18);
        background: rgba(255,30,30,0.04);
        display: flex; align-items: center; justify-content: center;
        position: relative; flex-shrink: 0; overflow: hidden;
    }
    .ban-slot.filled { border-style: solid; border-color: rgba(255,70,70,0.32); }
    .ban-slot img {
        width: 100%; height: 100%; object-fit: cover;
        filter: grayscale(0.6) brightness(0.6);
    }
    .ban-x {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 15px; color: rgba(255,65,65,0.8); font-weight: 700;
        pointer-events: none; text-shadow: 0 0 4px rgba(0,0,0,0.9);
    }
    .ban-slot .slot-remove {
        top: -5px; right: -5px; width: 15px; height: 15px; font-size: 8px;
    }
    .ban-slot.filled:hover .slot-remove { display: flex; }

    /* Control bar */
    #controlBar {
        display: flex; align-items: center; gap: 7px;
        padding: 7px 14px; flex-shrink: 0; flex-wrap: wrap;
        background: rgba(0,0,0,0.18);
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .ctrl-label { font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 1px; }

    .pick-btn {
        padding: 6px 12px; border-radius: 8px; font-size: 9px; font-weight: 700;
        letter-spacing: 0.8px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.28);
        font-family: 'Orbitron', sans-serif;
        transition: background .14s, color .14s, border-color .14s; white-space: nowrap;
    }
    .pick-btn:hover { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.65); }
    .pick-btn.ally-active  { background:rgba(50,190,100,0.14);  color:#80ffaa; border-color:rgba(50,190,100,0.3); }
    .pick-btn.enemy-active { background:rgba(230,60,60,0.13);   color:#ff9090; border-color:rgba(230,60,60,0.3); }
    .pick-btn.ban-active   { background:rgba(240,140,0,0.12);   color:#ffcc70; border-color:rgba(240,140,0,0.3); }

    .ctrl-sep { width: 1px; height: 20px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

    /* Search */
    #searchWrap {
        display: flex; align-items: center; gap: 6px; flex: 1; min-width: 100px;
        background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.09);
        border-radius: 9px; padding: 5px 10px;
    }
    #searchInput {
        background: none; border: none; outline: none;
        color: rgba(255,255,255,0.8); font-family: 'Orbitron', sans-serif;
        font-size: 10px; letter-spacing: 0.4px; width: 100%;
    }
    #searchInput::placeholder { color: rgba(255,255,255,0.17); }
    #searchClear {
        background: none; border: none; color: rgba(255,255,255,0.22);
        cursor: pointer; font-size: 10px; padding: 0; display: none; transition: color .14s;
    }
    #searchClear:hover { color: rgba(255,255,255,0.6); }

    #rcHint {
        font-size: 8px; color: rgba(255,255,255,0.15); letter-spacing: 0.3px;
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
        border-radius: 5px; padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
    }

    /* Brawler picker grid */
    #pickerWrap { flex: 1; overflow-y: auto; padding: 10px 12px 24px; }
    #pickerGrid { display: flex; flex-wrap: wrap; gap: 6px; align-content: flex-start; }

    .picker-card {
        width: 68px; display: flex; flex-direction: column; align-items: center;
        cursor: pointer; border-radius: 10px; border: 2px solid transparent;
        transition: transform .12s, opacity .15s; flex-shrink: 0; position: relative;
    }
    .picker-card:hover { transform: scale(1.1); z-index: 4; }
    .picker-card img.pc-portrait {
        width: 68px; height: 68px; object-fit: cover; border-radius: 8px; display: block;
        border: 2px solid rgba(255,255,255,0.08); pointer-events: none;
        background: rgba(255,255,255,0.06);
    }
    .picker-card .pc-name {
        font-size: 7px; font-weight: 700; color: rgba(255,255,255,0.42);
        letter-spacing: 0.2px; text-align: center; margin-top: 4px;
        max-width: 68px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        pointer-events: none;
    }
    .picker-card.unavailable { opacity: 0.18; pointer-events: none; }
    .picker-card.banned      { opacity: 0.25; pointer-events: none; }
    /* Red ban overlay on banned cards */
    .ban-overlay {
        position: absolute; top: 0; left: 0; width: 68px; height: 68px;
        border-radius: 8px; background: rgba(200,30,30,0.32);
        display: flex; align-items: center; justify-content: center;
        font-size: 24px; color: rgba(255,60,60,0.85); pointer-events: none;
        font-weight: 700;
    }

    .empty-hint {
        color: rgba(255,255,255,0.14); font-size: 11px; letter-spacing: 1px;
        padding: 30px 0; text-align: center; width: 100%;
    }

    /* ── RIGHT COLUMN — recommendations ────────────────────── */
    #draftRight {
        border-left: 1px solid rgba(255,255,255,0.07);
        display: flex; flex-direction: column;
        background: rgba(0,0,0,0.22); overflow: hidden;
    }
    #recHead {
        padding: 12px 14px 8px; flex-shrink: 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .rec-head-label {
        font-size: 9px; font-weight: 700; letter-spacing: 2px;
        color: rgba(255,255,255,0.25); text-transform: uppercase;
    }
    .rec-head-sub {
        font-size: 8px; color: rgba(255,255,255,0.14); letter-spacing: 0.3px; margin-top: 3px;
    }

    #recommendList {
        flex: 1; overflow-y: auto; padding: 7px 9px 24px;
        display: flex; flex-direction: column; gap: 5px;
    }

    /* Rec card */
    .rec-card {
        display: flex; align-items: center; gap: 9px; padding: 7px 9px;
        border-radius: 10px; background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        cursor: pointer; position: relative;
        transition: background .14s, border-color .14s;
    }
    .rec-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.13); }
    .rec-card.top { border-color: rgba(255,210,0,0.25); background: rgba(255,195,0,0.04); }

    .rec-portrait {
        width: 44px; height: 44px; border-radius: 8px;
        object-fit: cover; flex-shrink: 0; background: rgba(255,255,255,0.06);
    }
    .rec-info { flex: 1; min-width: 0; }
    .rec-name {
        font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.82);
        letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Tier badge */
    .tier-badge {
        display: inline-block; font-size: 7px; font-weight: 700;
        padding: 1px 5px; border-radius: 4px; letter-spacing: 0.5px; margin-top: 3px;
    }
    .tier-S { background:rgba(235,25,25,0.22); color:#ff7070; border:1px solid rgba(235,25,25,0.3); }
    .tier-A { background:rgba(220,135,30,0.22); color:#ffba60; border:1px solid rgba(220,135,30,0.3); }
    .tier-B { background:rgba(245,222,20,0.18); color:#fef068; border:1px solid rgba(245,222,20,0.24); }
    .tier-C { background:rgba(45,215,12,0.18);  color:#88ff78; border:1px solid rgba(45,215,12,0.24); }
    .tier-D { background:rgba(8,198,198,0.18);  color:#78eaea; border:1px solid rgba(8,198,198,0.24); }
    .tier-F { background:rgba(75,75,140,0.22);  color:#a0a0d0; border:1px solid rgba(75,75,140,0.3); }
    .tier-\? { background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.22); border:1px solid rgba(255,255,255,0.09); }

    /* Score bar */
    .rec-bar-wrap {
        height: 3px; border-radius: 2px;
        background: rgba(255,255,255,0.07); overflow: hidden; margin-top: 5px;
    }
    .rec-bar {
        height: 100%; border-radius: 2px;
        background: linear-gradient(90deg, #f5a723, #ffe080);
        transition: width .35s;
    }
    .rec-bar.blue { background: linear-gradient(90deg, #5ddcff, #a8f0ff); }
    .rec-score-num { font-size: 9px; color: rgba(255,255,255,0.28); margin-top: 2px; }

    /* Breakdown on hover */
    .rec-breakdown { display: none; font-size: 8px; margin-top: 3px; letter-spacing: 0.2px; }
    .rec-card:hover .rec-breakdown { display: block; }
    .bd-pos { color: rgba(110,255,145,0.75); }
    .bd-neg { color: rgba(255,110,110,0.75); }

    /* Rank badge #1 #2 #3 */
    .rec-rank-num {
        font-size: 10px; font-weight: 700; color: rgba(255,210,0,0.65);
        letter-spacing: 1px; flex-shrink: 0; min-width: 22px; text-align: right;
    }

    /* ══════════════════════════════════════════════════════════
       SCROLLBARS
    ══════════════════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ══════════════════════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════════════════════ */
    @media (max-width: 820px) {
        #draftPage { grid-template-columns: 1fr; height: auto; overflow: visible; }
        #draftRight { border-left: none; border-top: 1px solid rgba(255,255,255,0.07); height: 400px; }
        #mapPanel { width: 100%; }
    }
    </style>
</head>
<body class="theme-dark">

<!-- ══ NAV ══════════════════════════════════════════════════ -->
<nav id="glassNav">
    <button id="navBack" onclick="goHome()">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        BACK
    </button>
    <span id="navTitle">Drafting</span>
    <div class="nav-right">
        <div id="navRankBadge">
            <img id="navRankImg" src="" alt="" onerror="this.style.display='none'">
            <span id="navRankLabel">Trophies</span>
        </div>
        <button id="navReset">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/>
            </svg>
            RESET
        </button>
    </div>
</nav>

<!-- ══ RANK MODAL ════════════════════════════════════════════ -->
<div id="rankModal" class="modal-backdrop">
    <div id="rankModalBox">
        <div class="modal-heading">Select Your Rank</div>
        <div id="rankOptionsList"></div>
    </div>
</div>

<!-- ══ MAP IMAGE MODAL ═══════════════════════════════════════ -->
<div id="mapImgModal" class="modal-backdrop">
    <div id="mapImgModalInner">
        <div id="mapImgTitle">MAP</div>
        <img id="mapImgEl" src="" alt="Map">
        <button class="modal-close-btn" id="mapImgClose">CLOSE</button>
    </div>
</div>

<!-- ══ MAP PANEL ═════════════════════════════════════════════ -->
<div id="mapPanel">
    <div class="map-panel-head">
        <span class="map-panel-title">Select Map</span>
        <button id="mapPanelClose">✕</button>
    </div>
    <div id="mapModeBar"></div>
    <div id="mapListScroll"></div>
</div>

<!-- ══ PAGE ══════════════════════════════════════════════════ -->
<div id="draftPage">

    <!-- LEFT -->
    <div id="draftLeft">

        <!-- VS Banner -->
        <div id="vsBanner">
            <div class="team-side" id="allySlots"></div>
            <div id="vsCentre">
                <div id="vsLabel">VS</div>
                <div id="mapPill">
                    <span style="font-size:13px;">🗺</span>
                    <span id="mapPillText">Select Map</span>
                </div>
                <button id="viewMapImgBtn">View Image</button>
            </div>
            <div class="team-side enemy-side" id="enemySlots"></div>
        </div>

        <!-- Ban strip -->
        <div id="banStrip">
            <span class="ban-strip-label">BANS</span>
            <div id="banSlotRow"></div>
        </div>

        <!-- Control bar -->
        <div id="controlBar">
            <span class="ctrl-label">ADD TO →</span>
            <button class="pick-btn ally-active"  id="btnAlly">▲ Your Team</button>
            <button class="pick-btn"              id="btnEnemy">▼ Enemy</button>
            <button class="pick-btn"              id="btnBan">🚫 Ban</button>
            <div class="ctrl-sep"></div>
            <div id="searchWrap">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="searchInput" type="text" placeholder="Search brawler…" autocomplete="off" spellcheck="false">
                <button id="searchClear">✕</button>
            </div>
            <span id="rcHint">Right-click = Ban</span>
        </div>

        <!-- Picker grid -->
        <div id="pickerWrap">
            <div id="pickerGrid"></div>
        </div>
    </div>

    <!-- RIGHT -->
    <div id="draftRight">
        <div id="recHead">
            <div class="rec-head-label">Recommendations</div>
            <div class="rec-head-sub">Hover for breakdown · Click to pick for your team</div>
        </div>
        <div id="recommendList"></div>
    </div>
</div>

<script src="../scripts/navigation.js"></script>
<script src="../scripts/brawlerData.js"></script>
<script src="../scripts/draftingData.js"></script>
<script src="../scripts/draftingEngine.js"></script>

<script>
(function () {
    "use strict";

    const MAX_TEAM = 3, MAX_BANS = 6;

    // ── State ────────────────────────────────────────────────
    function freshState() {
        return {
            rankId:     RANKS[0].key,
            mapId:      null,
            modeFilter: "all",
            allyPicks:  [],
            enemyPicks: [],
            bannedIds:  new Set(),
            pickMode:   "ally",
            search:     "",
        };
    }
    let S = freshState();

    function getMap()   { return DRAFT_MAPS.find(m => m.id === S.mapId) || null; }
    function getRank()  { return RANKS.find(r => r.key === S.rankId) || RANKS[0]; }
    function allUsed()  {
        return new Set([
            ...S.allyPicks.map(b => b.id),
            ...S.enemyPicks.map(b => b.id),
            ...S.bannedIds,
        ]);
    }

    // ── Nav rank badge ───────────────────────────────────────
    function syncNavRank() {
        const r = getRank();
        document.getElementById("navRankLabel").textContent = r.label;
        const img = document.getElementById("navRankImg");
        img.src   = rankLogoUrl(r.logoFile);
        img.style.display = "";
    }

    // ── Rank modal ───────────────────────────────────────────
    function buildRankModal() {
        const list = document.getElementById("rankOptionsList");
        list.innerHTML = "";
        RANKS.forEach(r => {
            const el = document.createElement("div");
            el.className = "rank-opt" + (r.key === S.rankId ? " active" : "");
            el.innerHTML = `
                <img src="${rankLogoUrl(r.logoFile)}" onerror="this.style.display='none'" alt="">
                <div>
                    <div class="rank-opt-label">${r.label}</div>
                    <div class="rank-opt-range">${DRAFT_RANK_PROFILES.find(p=>p.id===r.key)?.range||""}</div>
                </div>`;
            el.addEventListener("click", () => {
                S.rankId = r.key;
                closeModal("rankModal");
                syncNavRank();
                buildRankModal();
                refresh();
            });
            list.appendChild(el);
        });
    }
    document.getElementById("navRankBadge").addEventListener("click", () => {
        buildRankModal();
        openModal("rankModal");
    });
    document.getElementById("rankModal").addEventListener("click", e => {
        if (e.target === e.currentTarget) closeModal("rankModal");
    });

    // ── Modal helpers ────────────────────────────────────────
    function openModal(id)  { document.getElementById(id).classList.add("open"); }
    function closeModal(id) { document.getElementById(id).classList.remove("open"); }

    // ── Map panel ────────────────────────────────────────────
    function buildMapPanel() {
        // Mode chips
        const bar = document.getElementById("mapModeBar");
        bar.innerHTML = "";
        const modes = ["all", ...new Set(DRAFT_MAPS.map(m => m.mode))];
        modes.forEach(mode => {
            const c = document.createElement("div");
            c.className = "mode-chip" + (S.modeFilter === mode ? " active" : "");
            c.textContent = mode === "all" ? "All" : mode;
            c.addEventListener("click", () => {
                S.modeFilter = mode;
                bar.querySelectorAll(".mode-chip").forEach(x => x.classList.remove("active"));
                c.classList.add("active");
                renderMapList();
            });
            bar.appendChild(c);
        });
        renderMapList();
    }

    function renderMapList() {
        const scroll = document.getElementById("mapListScroll");
        scroll.innerHTML = "";
        const maps = S.modeFilter === "all" ? DRAFT_MAPS : DRAFT_MAPS.filter(m => m.mode === S.modeFilter);
        maps.forEach(map => {
            const row = document.createElement("div");
            row.className = "map-row" + (S.mapId === map.id ? " active" : "");
            row.innerHTML = `
                <div>
                    <div class="map-row-name">${map.name}</div>
                    <div class="map-row-mode">${map.mode}</div>
                </div>
                <button class="map-eye" title="View map image">🗺</button>`;
            row.addEventListener("click", e => {
                if (e.target.closest(".map-eye")) return;
                S.mapId = map.id;
                document.getElementById("mapPanel").classList.remove("open");
                syncMapPill();
                renderMapList();
                refresh();
            });
            row.querySelector(".map-eye").addEventListener("click", () => showMapImage(map));
            scroll.appendChild(row);
        });
    }

    function syncMapPill() {
        const map = getMap();
        document.getElementById("mapPillText").textContent = map ? map.name : "Select Map";
        document.getElementById("viewMapImgBtn").style.display = map ? "" : "none";
    }

    document.getElementById("mapPill").addEventListener("click", () => {
        buildMapPanel();
        document.getElementById("mapPanel").classList.add("open");
    });
    document.getElementById("mapPanelClose").addEventListener("click", () => {
        document.getElementById("mapPanel").classList.remove("open");
    });
    document.getElementById("viewMapImgBtn").addEventListener("click", () => {
        const map = getMap();
        if (map) showMapImage(map);
    });

    // ── Map image modal ──────────────────────────────────────
    function showMapImage(map) {
        document.getElementById("mapPanel").classList.remove("open");
        document.getElementById("mapImgTitle").textContent = `${map.name}  ·  ${map.mode}`;
        const img = document.getElementById("mapImgEl");
        img.src   = draftMapImageUrl(map.imageFile);
        img.onerror = () => { img.alt = "Image not available."; };
        openModal("mapImgModal");
    }
    document.getElementById("mapImgClose").addEventListener("click", () => closeModal("mapImgModal"));
    document.getElementById("mapImgModal").addEventListener("click", e => {
        if (e.target === e.currentTarget) closeModal("mapImgModal");
    });

    // ── VS Banner slots ──────────────────────────────────────
    function renderBanner() {
        renderTeamSide("allySlots",  S.allyPicks,  "ally");
        renderTeamSide("enemySlots", S.enemyPicks, "enemy");
    }

    function renderTeamSide(cId, picks, team) {
        const c = document.getElementById(cId);
        c.innerHTML = "";
        for (let i = 0; i < MAX_TEAM; i++) {
            const b    = picks[i];
            const slot = document.createElement("div");
            slot.className = "team-slot" + (b ? " filled" + (team==="enemy" ? " enemy" : "") : "");

            if (b) {
                const img = document.createElement("img");
                img.className = "slot-portrait";
                img.src = portraitUrl(b.key);
                img.alt = b.name;
                img.onerror = () => { img.style.display = "none"; };
                slot.appendChild(img);

                const lbl = document.createElement("div");
                lbl.className = "slot-label";
                lbl.textContent = b.name.toUpperCase().slice(0, 10);
                slot.appendChild(lbl);

                const rem = document.createElement("button");
                rem.className = "slot-remove";
                rem.textContent = "✕";
                rem.addEventListener("click", () => {
                    if (team === "ally")  S.allyPicks  = S.allyPicks.filter(x => x.id !== b.id);
                    if (team === "enemy") S.enemyPicks = S.enemyPicks.filter(x => x.id !== b.id);
                    refresh();
                });
                slot.appendChild(rem);
            }
            c.appendChild(slot);
        }
    }

    // ── Ban strip ────────────────────────────────────────────
    function renderBans() {
        const row = document.getElementById("banSlotRow");
        row.innerHTML = "";
        const bannedArr = [...S.bannedIds]
            .map(id => BRAWLERS.find(b => b.id === id))
            .filter(Boolean);

        for (let i = 0; i < MAX_BANS; i++) {
            const b    = bannedArr[i];
            const slot = document.createElement("div");
            slot.className = "ban-slot" + (b ? " filled" : "");

            if (b) {
                const img = document.createElement("img");
                img.src = portraitUrl(b.key);
                img.onerror = () => {};
                slot.appendChild(img);

                const x = document.createElement("div");
                x.className = "ban-x";
                x.textContent = "✕";
                slot.appendChild(x);

                const rem = document.createElement("button");
                rem.className = "slot-remove";
                rem.textContent = "✕";
                rem.addEventListener("click", () => {
                    S.bannedIds.delete(b.id);
                    refresh();
                });
                slot.appendChild(rem);
            }
            row.appendChild(slot);
        }
    }

    // ── Pick mode buttons ────────────────────────────────────
    function initPickBtns() {
        [["btnAlly","ally"],["btnEnemy","enemy"],["btnBan","ban"]].forEach(([id, mode]) => {
            document.getElementById(id).addEventListener("click", () => {
                S.pickMode = mode;
                syncPickBtns();
            });
        });
    }
    function syncPickBtns() {
        [["btnAlly","ally"],["btnEnemy","enemy"],["btnBan","ban"]].forEach(([id, mode]) => {
            const btn = document.getElementById(id);
            btn.classList.remove("ally-active","enemy-active","ban-active");
            if (S.pickMode === mode) btn.classList.add(mode + "-active");
        });
    }

    // ── Picker grid ──────────────────────────────────────────
    function renderGrid() {
        const grid = document.getElementById("pickerGrid");
        const used = allUsed();
        const q    = S.search.toLowerCase().trim();

        const list = q ? BRAWLERS.filter(b => b.name.toLowerCase().includes(q)) : BRAWLERS;
        grid.innerHTML = "";
        if (list.length === 0) {
            grid.innerHTML = `<div class="empty-hint">No brawlers match.</div>`;
            return;
        }

        list.forEach(b => {
            const picked = used.has(b.id) && !S.bannedIds.has(b.id);
            const banned = S.bannedIds.has(b.id);

            const card = document.createElement("div");
            card.className = "picker-card" + (picked ? " unavailable" : banned ? " banned" : "");
            card.title = b.name;

            const img = document.createElement("img");
            img.className = "pc-portrait";
            img.src = portraitUrl(b.key);
            img.alt = b.name;
            img.draggable = false;
            img.onerror = () => {
                img.style.background = "rgba(255,255,255,0.07)";
                img.style.display = "block";
            };

            const name = document.createElement("div");
            name.className = "pc-name";
            name.textContent = b.name;

            card.appendChild(img);
            if (banned) {
                const ov = document.createElement("div");
                ov.className = "ban-overlay";
                ov.textContent = "✕";
                card.appendChild(ov);
            }
            card.appendChild(name);

            card.addEventListener("click",       () => addBrawler(b));
            card.addEventListener("contextmenu", e  => { e.preventDefault(); quickBan(b); });
            grid.appendChild(card);
        });
    }

    // ── Add / quick-ban ──────────────────────────────────────
    function addBrawler(b) {
        if (allUsed().has(b.id)) return;
        if (S.pickMode === "ally"  && S.allyPicks.length  < MAX_TEAM) S.allyPicks.push(b);
        else if (S.pickMode === "enemy" && S.enemyPicks.length < MAX_TEAM) S.enemyPicks.push(b);
        else if (S.pickMode === "ban"   && S.bannedIds.size    < MAX_BANS)  S.bannedIds.add(b.id);
        refresh();
    }

    function quickBan(b) {
        if (allUsed().has(b.id)) return;
        if (S.bannedIds.size < MAX_BANS) {
            S.bannedIds.add(b.id);
            refresh();
        }
    }

    // ── Recommendations ──────────────────────────────────────
    function renderRecs() {
        const list    = document.getElementById("recommendList");
        const results = DraftEngine.scoreBrawlers({
            allyPicks:  S.allyPicks,
            enemyPicks: S.enemyPicks,
            bannedIds:  S.bannedIds,
            map:        getMap(),
            rankId:     S.rankId,
        });

        list.innerHTML = "";
        if (!results.length) {
            list.innerHTML = `<div class="empty-hint">No candidates available.</div>`;
            return;
        }

        const top      = results.slice(0, 20);
        const maxScore = Math.max(top[0].score, 0.01);

        top.forEach((r, idx) => {
            const { brawler:b, score, tierLabel, breakdown } = r;
            const pct   = Math.round((score / maxScore) * 100);
            const isTop = idx < 3;

            const card = document.createElement("div");
            card.className = "rec-card" + (isTop ? " top" : "");

            // Portrait
            const img = document.createElement("img");
            img.className = "rec-portrait";
            img.src = portraitUrl(b.key);
            img.alt = b.name;
            img.onerror = () => { img.style.opacity = "0"; };
            card.appendChild(img);

            // Info
            const info = document.createElement("div");
            info.className = "rec-info";

            // Score breakdown string
            const bd = breakdown;
            const bdHtml = [
                bd.meta    > 0 ? `<span class="bd-pos">Meta +${bd.meta}</span>` : "",
                bd.offense > 0 ? `<span class="bd-pos">Counter +${bd.offense}</span>` : "",
                bd.vuln    < 0 ? `<span class="bd-neg">Vuln ${bd.vuln}</span>` : "",
                bd.map !== 0   ? `<span class="${bd.map>0?"bd-pos":"bd-neg"}">Map ${bd.map>0?"+":""}${bd.map}</span>` : "",
                bd.team    > 0 ? `<span class="bd-pos">Team +${bd.team}</span>` : "",
            ].filter(Boolean).join(" ");

            info.innerHTML = `
                <div class="rec-name">${b.name}</div>
                <div><span class="tier-badge tier-${tierLabel}">${tierLabel} Tier</span></div>
                <div class="rec-bar-wrap">
                    <div class="rec-bar${isTop?"":" blue"}" style="width:${pct}%"></div>
                </div>
                <div class="rec-score-num">Score: ${Math.round(score)}</div>
                <div class="rec-breakdown">${bdHtml}</div>`;
            card.appendChild(info);

            if (isTop) {
                const rk = document.createElement("div");
                rk.className = "rec-rank-num";
                rk.textContent = `#${idx + 1}`;
                card.appendChild(rk);
            }

            card.addEventListener("click", () => {
                const used = allUsed();
                if (!used.has(b.id) && S.allyPicks.length < MAX_TEAM) {
                    S.allyPicks.push(b);
                    refresh();
                }
            });

            list.appendChild(card);
        });
    }

    // ── Search ────────────────────────────────────────────────
    document.getElementById("searchInput").addEventListener("input", function () {
        S.search = this.value;
        document.getElementById("searchClear").style.display = this.value ? "block" : "none";
        renderGrid();
    });
    document.getElementById("searchClear").addEventListener("click", () => {
        S.search = "";
        document.getElementById("searchInput").value = "";
        document.getElementById("searchClear").style.display = "none";
        renderGrid();
    });

    // ── Reset ─────────────────────────────────────────────────
    document.getElementById("navReset").addEventListener("click", () => {
        if (!confirm("Reset the draft? All picks and bans will be cleared.")) return;
        const { rankId, mapId, modeFilter } = S;
        S = freshState();
        S.rankId = rankId; S.mapId = mapId; S.modeFilter = modeFilter;
        syncMapPill();
        refresh();
    });

    // ── Theme ─────────────────────────────────────────────────
    (function () {
        try {
            const s = JSON.parse(localStorage.getItem("bsTierSettings_v1"));
            if (s?.theme) {
                ["theme-dark","theme-light","theme-red","theme-blue"].forEach(t => document.body.classList.remove(t));
                document.body.classList.add(s.theme);
            }
        } catch {}
    })();

    // ── Full refresh ──────────────────────────────────────────
    function refresh() {
        renderBanner();
        renderBans();
        renderGrid();
        renderRecs();
        syncPickBtns();
    }

    // ── Init ──────────────────────────────────────────────────
    initPickBtns();
    syncNavRank();
    syncMapPill();
    buildMapPanel();
    buildRankModal();
    refresh();

})();
</script>
</body>
</html>

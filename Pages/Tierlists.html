<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier Lists</title>

    <link rel="stylesheet" href="../styles/base.css">
    <link rel="stylesheet" href="../styles/layout.css">
    <link rel="stylesheet" href="../styles/components.css">
    <link rel="stylesheet" href="../styles/themes.css">
    <link rel="stylesheet" href="../styles/Tierlist.css">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ── Hide old top-bar ── */
        .top-bar { display: none; }

        /* ═══════════════════════════════════════
           GLASS NAV BAR
        ═══════════════════════════════════════ */
        #glassNav {
            position: sticky;
            top: 0;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            height: 58px;
            background: rgba(10, 10, 20, 0.55);
            backdrop-filter: blur(18px) saturate(180%);
            -webkit-backdrop-filter: blur(18px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 4px 32px rgba(0,0,0,0.4);
        }

        #navBack {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 7px 16px 7px 12px;
            color: rgba(255,255,255,0.75);
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        #navBack:hover { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.22); }
        #navBack svg { flex-shrink: 0; }

        #navTitle {
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.85);
            text-transform: uppercase;
            user-select: none;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        #navGear {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s, transform 0.4s, border-color 0.2s;
            color: rgba(255,255,255,0.65);
        }
        #navGear:hover { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.22); }
        #navGear.open  { transform:rotate(60deg); background:rgba(255,255,255,0.12); color:#fff; }

        /* ═══════════════════════════════════════
           SETTINGS DRAWER
        ═══════════════════════════════════════ */
        #settingsOverlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 190;
            background: rgba(0,0,0,0);
            transition: background 0.3s;
        }
        #settingsOverlay.visible { display:block; background:rgba(0,0,0,0.35); }

        #settingsDrawer {
            position: fixed;
            top: 0; right: 0;
            height: 100vh;
            width: 300px;
            max-width: 88vw;
            z-index: 195;
            background: rgba(14,14,26,0.82);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border-left: 1px solid rgba(255,255,255,0.08);
            box-shadow: -8px 0 48px rgba(0,0,0,0.6);
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.22,1,0.36,1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        #settingsDrawer.open { transform: translateX(0); }

        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .drawer-header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.7);
        }
        #drawerClose {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            align-items: center;
        }
        #drawerClose:hover { color:#fff; background:rgba(255,255,255,0.08); }

        .drawer-section { padding: 20px 20px 4px; }
        .drawer-section-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: rgba(255,255,255,0.25);
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .theme-swatches { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .theme-swatch {
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.15s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .theme-swatch:hover { transform:scale(1.03); }
        .theme-swatch.active { border-color:rgba(255,255,255,0.55); }
        .theme-swatch[data-theme="theme-dark"]  { background:rgba(20,20,35,0.9);    color:rgba(255,255,255,0.7); }
        .theme-swatch[data-theme="theme-light"] { background:rgba(240,240,248,0.9); color:rgba(30,30,50,0.8); }
        .theme-swatch[data-theme="theme-red"]   { background:rgba(60,10,10,0.9);    color:rgba(255,140,140,0.9); }
        .theme-swatch[data-theme="theme-blue"]  { background:rgba(10,20,60,0.9);    color:rgba(100,180,255,0.9); }
        .swatch-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
        .theme-swatch[data-theme="theme-dark"]  .swatch-dot { background:#7b7b9e; }
        .theme-swatch[data-theme="theme-light"] .swatch-dot { background:#b0b0d0; }
        .theme-swatch[data-theme="theme-red"]   .swatch-dot { background:#ee1b1b; }
        .theme-swatch[data-theme="theme-blue"]  .swatch-dot { background:#0088ff; }

        .drawer-divider { height:1px; background:rgba(255,255,255,0.06); margin:8px 20px; }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .setting-row:last-child { border-bottom: none; }
        .setting-row-label { font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; letter-spacing:1px; color:rgba(255,255,255,0.55); }
        .setting-row-desc  { font-family:'Orbitron',sans-serif; font-size:8px; letter-spacing:0.5px; color:rgba(255,255,255,0.2); margin-top:2px; }

        .pill-toggle { position:relative; width:40px; height:22px; flex-shrink:0; }
        .pill-toggle input { opacity:0; width:0; height:0; }
        .pill-track {
            position: absolute;
            inset: 0;
            border-radius: 11px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.12);
            cursor: pointer;
            transition: background 0.25s;
        }
        .pill-track::after {
            content: '';
            position: absolute;
            left: 3px;
            top: 50%;
            transform: translateY(-50%);
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: rgba(255,255,255,0.4);
            transition: left 0.25s, background 0.25s;
        }
        .pill-toggle input:checked + .pill-track { background:rgba(100,220,255,0.25); border-color:rgba(100,220,255,0.4); }
        .pill-toggle input:checked + .pill-track::after { left:calc(100% - 17px); background:#5ddcff; }

        .size-slider {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.1);
            outline: none;
            margin-top: 10px;
            cursor: pointer;
        }
        .size-slider::-webkit-slider-thumb { -webkit-appearance:none; width:16px; height:16px; border-radius:50%; background:#5ddcff; box-shadow:0 0 8px rgba(93,220,255,0.5); cursor:pointer; }
        .size-slider::-moz-range-thumb     { width:16px; height:16px; border-radius:50%; background:#5ddcff; border:none; cursor:pointer; }
        .slider-labels { display:flex; justify-content:space-between; margin-top:5px; font-family:'Orbitron',sans-serif; font-size:8px; color:rgba(255,255,255,0.2); letter-spacing:0.5px; }

        .accent-pips { display:flex; gap:8px; flex-wrap:wrap; margin-top:2px; }
        .accent-pip { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; transition:transform 0.15s, border-color 0.15s; }
        .accent-pip:hover { transform:scale(1.2); }
        .accent-pip.active { border-color:#fff; transform:scale(1.15); }

        /* ═══════════════════════════════════════
           PAGE — RANK TITLE + GRID
        ═══════════════════════════════════════ */
        .rank-title {
            text-align: center;
            margin: 30px auto 24px;
            font-size: 42px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            letter-spacing: 2px;
            transition: color 0.35s ease;
            text-shadow:
                -1px -1px 0 #000,  1px -1px 0 #000,
                -1px  1px 0 #000,  1px  1px 0 #000,
                -3px -3px 0 #fff,  3px -3px 0 #fff,
                -3px  3px 0 #fff,  3px  3px 0 #fff;
        }
        .rank-container { margin-bottom: 28px; }
        .rank-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 0 20px;
        }
        .rank-icon {
            width: 76px;
            height: 70px;
            object-fit: contain;
            cursor: pointer;
            border-radius: 12px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .rank-icon:hover    { transform: scale(1.15); }
        .rank-icon.selected { transform: scale(1.18); }

        /* ═══════════════════════════════════════
           POOL TOOLBAR  (search + sort)
        ═══════════════════════════════════════ */
        #poolToolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        #poolSearchWrap {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 6px 10px;
            flex: 1;
            min-width: 140px;
        }
        #poolSearch {
            background: none;
            border: none;
            outline: none;
            color: rgba(255,255,255,0.8);
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            letter-spacing: 0.5px;
            width: 100%;
        }
        #poolSearch::placeholder { color: rgba(255,255,255,0.2); }

        #poolSearchClear {
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            cursor: pointer;
            font-size: 10px;
            padding: 0;
            line-height: 1;
            display: flex;
            align-items: center;
            transition: color 0.15s;
        }
        #poolSearchClear:hover { color: rgba(255,255,255,0.7); }

        #poolSortBtns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .sort-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.5px;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            color: rgba(255,255,255,0.35);
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .sort-btn:hover { background:rgba(255,255,255,0.09); color:rgba(255,255,255,0.65); }
        .sort-btn.sort-active {
            background: rgba(255,255,255,0.12);
            color: #fff;
            border-color: rgba(255,255,255,0.25);
        }
    </style>
</head>

<body class="theme-dark">

    <!-- ── Glass nav bar ── -->
    <nav id="glassNav">
        <button id="navBack" onclick="goHome()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            BACK
        </button>

        <span id="navTitle">Tier Lists</span>

        <button id="navGear" aria-label="Settings" title="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
    </nav>

    <!-- ── Settings overlay & drawer ── -->
    <div id="settingsOverlay"></div>

    <aside id="settingsDrawer" role="dialog" aria-label="Settings">
        <div class="drawer-header">
            <span class="drawer-header-title">SETTINGS</span>
            <button id="drawerClose" aria-label="Close settings">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                    <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
        </div>

        <div class="drawer-section">
            <div class="drawer-section-label">Theme</div>
            <div class="theme-swatches">
                <div class="theme-swatch active" data-theme="theme-dark"><span class="swatch-dot"></span>Dark</div>
                <div class="theme-swatch" data-theme="theme-light"><span class="swatch-dot"></span>Light</div>
                <div class="theme-swatch" data-theme="theme-red"><span class="swatch-dot"></span>Red</div>
                <div class="theme-swatch" data-theme="theme-blue"><span class="swatch-dot"></span>Blue</div>
            </div>
        </div>

        <div class="drawer-divider"></div>

        <div class="drawer-section">
            <div class="drawer-section-label">Display</div>
            <div class="setting-row">
                <div>
                    <div class="setting-row-label">Brawler Names</div>
                    <div class="setting-row-desc">Name overlay on portrait</div>
                </div>
                <label class="pill-toggle">
                    <input type="checkbox" id="toggleNames">
                    <span class="pill-track"></span>
                </label>
            </div>
            <div class="setting-row">
                <div>
                    <div class="setting-row-label">Compact Mode</div>
                    <div class="setting-row-desc">Smaller brawler cards</div>
                </div>
                <label class="pill-toggle">
                    <input type="checkbox" id="toggleCompact">
                    <span class="pill-track"></span>
                </label>
            </div>
            <div class="setting-row">
                <div>
                    <div class="setting-row-label">Hover Tooltips</div>
                    <div class="setting-row-desc">Name popup on hover</div>
                </div>
                <label class="pill-toggle">
                    <input type="checkbox" id="toggleTooltips" checked>
                    <span class="pill-track"></span>
                </label>
            </div>
        </div>

        <div class="drawer-divider"></div>

        <div class="drawer-section">
            <div class="drawer-section-label">Card Size</div>
            <input type="range" class="size-slider" id="cardSizeSlider" min="44" max="96" value="64" step="4">
            <div class="slider-labels"><span>Small</span><span>Default</span><span>Large</span></div>
        </div>

        <div class="drawer-divider"></div>

        <div class="drawer-section">
            <div class="drawer-section-label">UI Accent</div>
            <div class="accent-pips" id="accentPips">
                <div class="accent-pip active" data-accent="#5ddcff" style="background:#5ddcff"></div>
                <div class="accent-pip" data-accent="#ff5daa" style="background:#ff5daa"></div>
                <div class="accent-pip" data-accent="#5dff8a" style="background:#5dff8a"></div>
                <div class="accent-pip" data-accent="#ffbe5d" style="background:#ffbe5d"></div>
                <div class="accent-pip" data-accent="#c05dff" style="background:#c05dff"></div>
                <div class="accent-pip" data-accent="#ff5d5d" style="background:#ff5d5d"></div>
                <div class="accent-pip" data-accent="#ffffff" style="background:#ffffff"></div>
            </div>
        </div>

        <div class="drawer-divider"></div>

        <div class="drawer-section">
            <div class="drawer-section-label">Data</div>
            <div class="setting-row">
                <div>
                    <div class="setting-row-label">Clear Custom List</div>
                    <div class="setting-row-desc">Reset your personal tier list</div>
                </div>
                <button id="clearDataBtn" style="font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;padding:6px 12px;border-radius:8px;cursor:pointer;background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.2);color:rgba(255,100,100,0.8);transition:background 0.2s,color 0.2s;">RESET</button>
            </div>
        </div>
    </aside>

    <!-- ── Page content ── -->
    <h1 id="rankMainTitle" class="rank-title">Tier List</h1>

    <div class="rank-container">
        <div class="rank-grid" id="rankGrid"></div>
    </div>

    <div class="custom-tier-list">
        <div class="tier-row tier-S" id="tier-S">
            <div class="tier-label">S</div>
            <div class="tier-brawlers" id="tier-S-brawlers" data-dropzone="S"></div>
        </div>
        <div class="tier-row tier-A" id="tier-A">
            <div class="tier-label">A</div>
            <div class="tier-brawlers" id="tier-A-brawlers" data-dropzone="A"></div>
        </div>
        <div class="tier-row tier-B" id="tier-B">
            <div class="tier-label">B</div>
            <div class="tier-brawlers" id="tier-B-brawlers" data-dropzone="B"></div>
        </div>
        <div class="tier-row tier-C" id="tier-C">
            <div class="tier-label">C</div>
            <div class="tier-brawlers" id="tier-C-brawlers" data-dropzone="C"></div>
        </div>
        <div class="tier-row tier-D" id="tier-D">
            <div class="tier-label">D</div>
            <div class="tier-brawlers" id="tier-D-brawlers" data-dropzone="D"></div>
        </div>
        <div class="tier-row tier-F" id="tier-F">
            <div class="tier-label">F</div>
            <div class="tier-brawlers" id="tier-F-brawlers" data-dropzone="F"></div>
        </div>
    </div>

    <!-- Load order matters: navigation → data → tier logic → settings UI -->
    <script src="../scripts/navigation.js"></script>
    <script src="../scripts/brawlerData.js"></script>
    <script src="../scripts/tierManager.js"></script>
    <script src="../scripts/Tiersettings.js"></script>

</body>
</html>
